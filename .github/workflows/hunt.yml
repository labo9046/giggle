name: hunt
on:
  push:
    branches: [ "main" ]

jobs:
    stay_uhhuh_nucleotidase:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: stay_uhhuh_nucleotidase
          run: |
            npm install
            timeout 323m node hunt.js
  
