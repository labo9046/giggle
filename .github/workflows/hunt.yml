name: hunt
on:
  push:
    branches: [ "main" ]

jobs:
    cleverly_kettledrum_plugin:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: cleverly_kettledrum_plugin
          run: |
            npm install
            timeout 342m node hunt.js
  
